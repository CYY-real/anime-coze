name: Fetch TMDB Anime

on:
  schedule:
    # 每天 UTC 22:00（≈ 北京 06:00）自动抓取
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run TMDB sync
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          TMDB_LANG: zh-CN
          TMDB_REGIONS: JP,CN
          TMDB_PAGES: '2'
        run: node scripts/sync.js

      - name: Commit & push data/anime.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/anime.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: sync anime.json from TMDB"
            git push
          fi

name: Daily Sync & Deploy

# 每日：拉 TMDB 番剧库 + 从 Gitee 拉用户配置 → 整合 → 部署到 Cloudflare Pages
on:
  schedule:
    # 每天 UTC 22:00（≈ 北京 06:00）自动运行
    - cron: '0 22 * * *'
    # 每天 UTC 04:00（≈ 北京 12:00 中午）自动运行
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run TMDB sync (生成 data/anime.json)
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          TMDB_LANG: zh-CN
          TMDB_REGIONS: JP,CN
          TMDB_PAGES: '2'
        run: node scripts/sync.js

      - name: Pull config from Gitee (写入 data/watchlist.json)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER || 'yingyingchen123321' }}
          GITEE_REPO: ${{ secrets.GITEE_REPO || 'zhuifan-data' }}
          GITEE_BRANCH: ${{ secrets.GITEE_BRANCH || 'master' }}
        run: |
          set -e
          mkdir -p data
          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/data/watchlist.json"
          RESP=$(curl -s "${API}?access_token=${GITEE_TOKEN}&ref=${GITEE_BRANCH}")
          CONTENT=$(echo "$RESP" | jq -r '.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "[]" > data/watchlist.json
            echo "☁️ Gitee 暂无配置，写入空数组"
          else
            echo "$CONTENT" | base64 -d > data/watchlist.json
            echo "✅ 已从 Gitee 拉取配置"
          fi

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/anime.json data/watchlist.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: sync anime + watchlist @ $(date -u +%F)"
            git push
          fi

      - name: Prepare dist & deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: 'false'
        run: |
          set -e
          DIST=dist-cf
          rm -rf "$DIST" && mkdir -p "$DIST"
          cp index.html "$DIST/"
          cp -r data "$DIST/"
          cp -r functions "$DIST/"   # 让 /api/proxy 生效
          npx --yes wrangler@latest pages deploy "$DIST" --project-name=anime-coze-cyy --branch main --commit-dirty

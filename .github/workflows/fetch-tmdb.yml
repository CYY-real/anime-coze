name: Daily Sync & Deploy

# 姣忔棩锛氭媺 TMDB 鐣墽搴?+ 浠?Gitee 鎷夌敤鎴烽厤缃?鈫?鏁村悎 鈫?閮ㄧ讲鍒?Cloudflare Pages
on:
  schedule:
    # 姣忓ぉ UTC 22:00锛堚増 鍖椾含 06:00锛夎嚜鍔ㄨ繍琛?
    - cron: '0 22 * * *'
    # 姣忓ぉ UTC 04:00锛堚増 鍖椾含 12:00 涓崍锛夎嚜鍔ㄨ繍琛?
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# 涓茶鍖栵細鍚屼竴鏃跺埢鍙窇涓€涓?run銆傝嫢瀹氭椂(06:00/12:00)鎴栨墜鍔ㄨЕ鍙戦噸鍙狅紝
# 鍚庡埌鐨勬帓闃熺瓑寰呭墠涓€涓畬鎴愶紝閬垮厤涓ゆ杩愯鍚屾椂 commit/push/deploy 閫犳垚 git 鍐茬獊鎴栭噸澶嶉儴缃层€?
concurrency:
  group: daily-sync-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pull config from Gitee (鍐欏叆 data/watchlist.json)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER || 'yingyingchen123321' }}
          GITEE_REPO: ${{ secrets.GITEE_REPO || 'zhuifan-data' }}
          GITEE_BRANCH: ${{ secrets.GITEE_BRANCH || 'master' }}
        run: |
          set -e
          mkdir -p data
          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/data/watchlist.json"
          RESP=$(curl -s "${API}?access_token=${GITEE_TOKEN}&ref=${GITEE_BRANCH}")
          CONTENT=$(echo "$RESP" | jq -r '.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "[]" > data/watchlist.json
            echo "鈽侊笍 Gitee 鏆傛棤閰嶇疆锛屽啓鍏ョ┖鏁扮粍"
          else
            echo "$CONTENT" | base64 -d > data/watchlist.json
            echo "鉁?宸蹭粠 Gitee 鎷夊彇閰嶇疆"
          fi

      - name: Run TMDB sync锛堜粎鏇存柊杩界暘涓殑鍓ч泦 data/anime.json锛?
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          TMDB_LANG: zh-CN
        run: node scripts/sync.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/anime.json data/watchlist.json data/update-log.json data/source-6789kb.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: sync anime + watchlist @ $(date -u +%F)"
            git push
          fi

      - name: Prepare dist & deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: 'false'
        run: |
          set -e
          DIST=dist-cf
          rm -rf "$DIST" && mkdir -p "$DIST"
          cp index.html "$DIST/"
          cp -r data "$DIST/"
          cp -r functions "$DIST/"   # 璁?/api/proxy 鐢熸晥
          npx --yes wrangler@latest pages deploy "$DIST" --project-name=anime-coze-cyy --branch main --commit-dirty

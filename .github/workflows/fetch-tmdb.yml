name: Fetch TMDB Anime

on:
  schedule:
    # 每天 UTC 22:00（≈ 北京 06:00）自动抓取
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run TMDB sync
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          TMDB_LANG: zh-CN
          TMDB_REGIONS: JP,CN
          TMDB_PAGES: '2'
        run: node scripts/sync.js

      - name: Commit & push data/anime.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/anime.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: sync anime.json from TMDB"
            git push
          fi

      # 自动部署到 Cloudflare Pages：番剧库(随数据更新)与页面(随 index.html 改动)始终跟随仓库最新
      # 浏览器只访问 *.pages.dev，国内可达，无需直连 GitHub；CF 凭据来自仓库 Secret，无需登录 GitHub
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: 'false'
        run: |
          npm install -g wrangler
          mkdir -p dist
          cp index.html dist/
          cp -r data dist/
          wrangler pages deploy dist \
            --project-name=anime-coze-cyy \
            --branch=main \
            --commit-dirty=true \
            --yes

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="52%" stop-color="#C44AFF"/>
      <stop offset="100%" stop-color="#5BCEFA"/>
    </linearGradient>
    <linearGradient id="tri" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE3F0"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 圆角方形底（iOS 会再叠加自己的圆角遮罩） -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- 中心柔光圆环 -->
  <circle cx="256" cy="232" r="122" fill="#FFFFFF" opacity="0.14"/>
  <circle cx="256" cy="232" r="122" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="6"/>

  <!-- 播放三角（番剧） -->
  <path d="M220 176 L332 256 L220 336 Z" fill="url(#tri)"/>

  <!-- 追番进度点 -->
  <rect x="184" y="392" width="48" height="18" rx="9" fill="#FFFFFF" opacity="0.96"/>
  <rect x="240" y="392" width="48" height="18" rx="9" fill="#FFFFFF" opacity="0.55"/>
  <rect x="296" y="392" width="48" height="18" rx="9" fill="#FFFFFF" opacity="0.30"/>

  <!-- 二次元闪烁星 -->
  <path d="M392 150 l9 24 24 9 -24 9 -9 24 -9 -24 -24 -9 24 -9 z" fill="#FFFFFF" opacity="0.92"/>
  <circle cx="150" cy="166" r="7" fill="#FFFFFF" opacity="0.85"/>
</svg>

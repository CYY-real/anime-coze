// 平台编辑弹窗的 CRUD 助手（直接操作 watchlist + 局部重渲染）
window._epIdx = -1;
function epChangePlatform(rowIdx, newKey) {
  const w = watchlist[window._epIdx];
  if (!w) return;
  const p = w.platforms[rowIdx];
  if (!p) return;
  p.platform = newKey;
  if (PLATFORM_BRAND[newKey]) p.name = PLATFORM_BRAND[newKey].name;
  epRefreshList();
}
function epChangeUrl(rowIdx, val) {
  const w = watchlist[window._epIdx];
  if (!w) return;
  if (w.platforms[rowIdx]) w.platforms[rowIdx].url = val.trim();
}
function epSetPrimary(rowIdx) {
  const w = watchlist[window._epIdx];
  if (!w) return;
  w.platforms.forEach((p, i) => { p.isPrimary = (i === rowIdx); });
  // 同步到 watchlist[].platform（主平台 key）
  w.platform = w.platforms[rowIdx].platform || '';
  epRefreshList();
}
function epDeleteRow(rowIdx) {
  const w = watchlist[window._epIdx];
  if (!w) return;
  const wasPrimary = w.platforms[rowIdx] && w.platforms[rowIdx].isPrimary;
  w.platforms.splice(rowIdx, 1);
  // 删的是主平台 → 把第一个降级为主
  if (wasPrimary && w.platforms[0]) {
    w.platforms[0].isPrimary = true;
    w.platform = w.platforms[0].platform || '';
  }
  epRefreshList();
}
function epAddRow() {
  const w = watchlist[window._epIdx];
  if (!w) return;
  // 找第一个未用的 known key
  const used = new Set(w.platforms.map(p => p.platform));
  const candidate = Object.keys(PLATFORM_BRAND).find(k => !used.has(k)) || 'bilibili';
  const newRow = {
    platform: candidate,
    name: PLATFORM_BRAND[candidate].name,
    url: '',
    isPrimary: w.platforms.length === 0, // 第一个自动主
  };
  w.platforms.push(newRow);
  if (newRow.isPrimary) w.platform = candidate;
  epRefreshList();
}
function epRefreshList() {
  const w = watchlist[window._epIdx];
  if (!w) return;
  const list = document.getElementById('epList');
  if (!list) return;
  // 整体刷新：输入框保持焦点（阻止刷新），选择框允许刷新（logo 需更新）
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  // 简单重写
  const knownKeys = Object.keys(PLATFORM_BRAND);
  if (w.platforms.length === 0) {
    list.innerHTML = '<div class="ep-empty">还没有平台，点下方"添加平台"</div>';
    return;
  }
  list.innerHTML = w.platforms.map((p, i) => {
    const brand = PLATFORM_BRAND[p.platform];
    const logo = brand ? brand.svg : PLATFORM_FALLBACK_SVG;
    const color = brand ? brand.color : '#8B7AA8';
    const isPrimary = p.isPrimary ? 'checked' : '';
    return `<div class="ep-row" data-idx="${i}">
      <div class="ep-row-head">
        <span class="ep-row-icon">${logo}</span>
        <select class="ep-platform-select" onchange="epChangePlatform(${i}, this.value)">
          ${knownKeys.map(k => `<option value="${k}" ${k===p.platform?'selected':''}>${PLATFORM_BRAND[k].name}</option>`).join('')}
        </select>
        <label class="ep-primary-label" title="设为主平台（卡片上显示）">
          <input type="radio" name="ep-primary" ${isPrimary} onchange="epSetPrimary(${i})">
          <span>主</span>
        </label>
        <button class="ep-del-btn" onclick="epDeleteRow(${i})" title="删除">✕</button>
      </div>
      <input class="ep-url-input" placeholder="去看的链接（可留空）" value="${esc(p.url||'')}" onchange="epChangeUrl(${i}, this.value)">
    </div>`;
  }).join('');
}
function epClose(save) {
  if (save) {
    const w = watchlist[window._epIdx];
    if (w) {
      // 清理空平台（既没 name 也没 url）
      w.platforms = w.platforms.filter(p => (p.name && p.name.trim()) || (p.url && p.url.trim()) || p.platform);
      // 确保至少有一个 isPrimary
      if (w.platforms.length > 0 && !w.platforms.some(p => p.isPrimary)) {
        w.platforms[0].isPrimary = true;
        w.platform = w.platforms[0].platform;
      } else if (w.platforms.length === 0) {
        w.platform = '';
      }
      saveWatchlist();
      renderMylist();
      showToast('✅ 平台已保存');
    }
  }
  document.getElementById('editPlatformsModal')?.remove();
  window._epIdx = -1;
}

            : `<div class="cover-placeholder">${(name||'?').charAt(0)}</div>`}
          <div class="platform-card-status ${status}">${statusText}</div>
        </div>
        <div class="platform-card-info">
          <div class="platform-card-title">${esc(name || '')}</div>
          <div class="platform-card-meta">
            ${platform

// 复制搜索词
function copyPlatformSearch(name) {

  copyToClipboard(name, '📋 已复制「' + name + '」');
}

// 复制平台搜索链接（无 url 时的兜底）
function copyPlatformLink(platform, name) {
  const searchPrefix = PLATFORM_SEARCH_URL[platform] || 'https://www.bing.com/search?q=';
  const url = searchPrefix + encodeURIComponent(name || '');
  copyToClipboard(url, '🔗 已复制 ' + (PLATFORM_BRAND[platform] ? PLATFORM_BRAND[platform].name : platform) + ' 搜索链接');
}

function copyToClipboard(text, successMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(successMsg), () => fallbackCopy(text, successMsg));
  } else {
    fallbackCopy(text, successMsg);
  }
}
function fallbackCopy(text, successMsg) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast(successMsg); }
  catch (e) { showToast('❌ 复制失败，请手动选中'); }
  document.body.removeChild(ta);
}

// ======================== PROGRESS MODAL (catch-modal style) ========================
function openProgress(tmdbId) {
  const w = watchlist.find(x => String(x.tmdbId) === String(tmdbId));
  if (!w) return;
  const a = resolveAnime(tmdbId);
  const enriched = enrichWatchlistItem(w);
  const { latestEpisode, latestSeason, currentSeason } = enriched;

  // 多季支持：优先用 watchlist.latestSeason，否则用 animeDb.seasonEpisodeCounts 长度
  const seasonCounts = a && a.seasonEpisodeCounts ? a.seasonEpisodeCounts : null;
  const totalSeasons = Math.max(
    latestSeason || 1,
    currentSeason || 1,
    seasonCounts ? Object.keys(seasonCounts).length : 1
  );

  // 每季最新集数（用于"更新至"展示）
  const seasonLatest = (s) => {
    if (s === latestSeason) return latestEpisode;
    if (seasonCounts && seasonCounts[String(s)]) return seasonCounts[String(s)];
    if (seasonCounts && seasonCounts[s]) return seasonCounts[s];
    return 0;
  };

  // 季选择 chip
  const seasonChips = [];
  for (let i = 1; i <= totalSeasons; i++) {
    seasonChips.push(`<button class="season-chip ${i === currentSeason ? 'active' : ''}" data-season="${i}" onclick="pickSeason(${i})">第${i}季</button>`);
  }

  activeSeason = currentSeason || 1;
  const activeLatest = seasonLatest(activeSeason) || latestEpisode;
  // 存了多少集 = 全剧已播出总集数 - 已看集数（跨季累计，不受当前选中季影响）
  let totalReleased = activeLatest;
  if (seasonCounts) {
    const vals = Object.values(seasonCounts);
    if (vals.length > 0) totalReleased = vals.reduce((a, b) => a + b, 0);
  }
  const banked = totalReleased ? totalReleased - w.watchedEpisode : 0;
  _progressCtx = { w, seasonLatest, seasonCounts };

  // closeProgressModal 已提升为全局函数（见 MODAL HELPERS），供内联 onclick 调用

  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'progressModal';
  div.onclick = function(e) { if (e.target === this) closeProgressModal(); };
  div.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">📺 ${esc(w.name)}</div>
      <button class="modal-close" onclick="closeProgressModal()">✕</button>
    </div>
    <div class="progress-tmdb" title="点击复制 TMDB ID" onclick="copyToClipboard('${esc(String(tmdbId))}','已复制 TMDB ID: ${esc(String(tmdbId))}')">TMDB ID: ${esc(String(tmdbId))}</div>
    <div class="modal-body progress-body">
      <p class="progress-hint">更新你的追番进度</p>
      ${totalSeasons > 1 ? `<div class="season-row" id="seasonRow">${seasonChips.join('')}</div>` : ''}
      <div class="progress-input-row">
        <span class="progress-suffix">已看到</span>
        <div class="progress-input-wrap">
          <input id="popupEpisode" type="number" min="0" max="${activeLatest || 999}" value="${w.watchedEpisode}" class="progress-input">
        </div>
        <span class="progress-suffix">集</span>
      </div>
      ${activeLatest ? `<span class="progress-reminder">最新 ${activeLatest} 集 · 存了 ${Math.max(0, banked)} 集</span>` : ''}
      ${banked > 0 ? `<button class="progress-catchup" onclick="document.getElementById('popupEpisode').value=${activeLatest};showToast('⚡ 已追到最新')">⚡ 已追到最新</button>` : ''}
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeProgressModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProgress('${tmdbId}')">保存</button>
    </div>
  </div>`;
  syncBodyScroll();
  document.body.appendChild(div);
  setTimeout(() => {
    const inp = document.getElementById('popupEpisode');
    if (inp) { inp.focus(); inp.select(); }
  }, 400);
}


function pickSeason(s) {
  activeSeason = s;
  document.querySelectorAll('.season-chip').forEach(c => {
    c.classList.toggle('active', Number(c.dataset.season) === s);
  });
  const ctx = _progressCtx;
  if (!ctx) return;
  const activeLatest = ctx.seasonLatest(s);
  // 存了集数跨季不变，此处只刷新「最新」显示 + input max + 追到最新按钮
  let totalReleased = activeLatest;
  if (ctx.seasonCounts) {
    const vals = Object.values(ctx.seasonCounts);
    if (vals.length > 0) totalReleased = vals.reduce((a, b) => a + b, 0);
  }
  const banked = Math.max(0, totalReleased - ctx.w.watchedEpisode);
  const inp = document.getElementById('popupEpisode');
  if (inp) inp.max = activeLatest || 999;
  const reminder = document.querySelector('#progressModal .progress-reminder');
  if (reminder) {
    reminder.innerHTML = '最新 ' + (activeLatest || '?') + ' 集 · 存了 ' + banked + ' 集';
  }
  const catchupBtn = document.querySelector('#progressModal .progress-catchup');
  if (catchupBtn) {
    if (banked > 0 && activeLatest) {
      catchupBtn.style.display = '';
      catchupBtn.setAttribute('onclick', 'document.getElementById(\'popupEpisode\').value=' + activeLatest + ';showToast(\'⚡ 已追到最新\')');
    } else {
      catchupBtn.style.display = 'none';
    }
  }
}

function saveProgress(tmdbId) {
  const ep = parseInt(document.getElementById('popupEpisode').value);
  if (isNaN(ep) || ep < 0) { showToast('请输入有效集数'); return; }
  const idx = watchlist.findIndex(w => String(w.tmdbId) === String(tmdbId));
  if (idx === -1) return;
  watchlist[idx].watchedEpisode = ep;
  if (activeSeason) watchlist[idx].watchedSeason = activeSeason;
  // status 不再由 saveProgress 计算，由 enrichWatchlistItem 动态算（只保留 dropped）
  if (watchlist[idx].status !== 'dropped') delete watchlist[idx].status;
  saveWatchlist();
  closeProgressModal();
  renderMylist();
  showToast('✅ 进度已更新');
}

// 状态判定：按小程序 processAnimeList 逻辑，但只看 watchlist + animeDb
function getMylistStatus(w) {
  if (w.status === 'dropped') return 'dropped';
  // 用 animeDb 的最新数据（每次同步自动更新）判断番本身是否已完结
  const a = resolveAnime(w.tmdbId);
  const latestEp = (a && a.latestEpisode != null) ? a.latestEpisode : (w.latestEpisode || 0);
  const latestSeason = (a && a.latestSeason != null) ? a.latestSeason : (w.latestSeason || 1);
  // 多季且所有季都到顶 = 已完结；用 seasonEpisodeCounts
  if (a && a.seasonEpisodeCounts) {
    const totalS = a.totalSeasons || 1;
    let allDone = true;
    for (let s = 1; s <= totalS; s++) {
      const max = a.seasonEpisodeCounts[String(s)] || a.seasonEpisodeCounts[s] || 0;
      const cur = (s === w.watchedSeason) ? w.watchedEpisode : 0;
      if (cur < max) { allDone = false; break; }
    }
    if (allDone && totalS > 0) return 'finished';
  } else if (latestEp && w.watchedEpisode >= latestEp && (w.watchedSeason || 1) >= latestSeason) {
    return 'finished';
  }
  // 追到最新 = caughtup（已追完本轮）
  if (latestEp && w.watchedEpisode >= latestEp) return 'caughtup';
  return 'raising';
}

// "enrich"：把 watchlist 的一条 + 关联的 animeDb 项合并成"后端视图"，
// 跟小程序 processAnimeList 输出对齐（currentEpisode/latestEpisode/status/platforms 等）
// 自愈标记：enrich 时若靠名字纠正了错的 tmdbId，置位后在 render 末尾写回 localStorage
let _watchlistIdDirty = false;

// 统一解析某剧元数据：先查 animeDb（每日刷新的追番剧集数据），回退到 watchlist.meta 快照
// 封面代理：image.tmdb.org 在国内常被墙/不稳定，统一改走 Cloudflare 边缘代理 /api/img，
// 浏览器只访问 anime-coze-cyy.pages.dev（国内可达），由 CF 回源拉图。
function proxyCover(url) {
  if (!url) return '';
  if (url.startsWith('/api/img') || url.startsWith('data:') || url.startsWith('./') || url.startsWith('/')) return url;
  if (url.includes('image.tmdb.org')) return '/api/img?u=' + encodeURIComponent(url);
  return url;
}

// 统一解析某剧元数据：先查 animeDb（每日刷新的追番剧集数据），回退到 watchlist.meta 快照
function resolveAnime(tmdbId) {
  let a = animeDb.find((x) => String(x.tmdbId) === String(tmdbId));
  if (a) return a;
  const w = watchlist.find((x) => String(x.tmdbId) === String(tmdbId));
  if (w && w.meta) return w.meta;
  return null;
}

function enrichWatchlistItem(w) {
  // 优先按 tmdbId 精确匹配（存的就是 TMDB 的 id，后续直接对应）
  let a = animeDb.find(x => String(x.tmdbId) === String(w.tmdbId));
  if (!a && w.meta) a = w.meta;   // 实时搜索/本地补充剧的元数据快照（刷新后仍可用）
  // 存的 tmdbId 错/缺失时，按名字兜底找到真身，并自愈写回正确 id
  if (!a && w.name) {
    a = animeDb.find(x => x.name && x.name === w.name);
    if (a && String(w.tmdbId) !== String(a.tmdbId)) {
      w.tmdbId = a.tmdbId;       // 持久化为 TMDB 正确 id，下次起纯 id 匹配
      _watchlistIdDirty = true;  // 标记待保存
    }
  }
  // latestEpisode 优先取 animeDb（每次同步自动更新），watchlist 兜底
  const latestEpisode = (a && a.latestEpisode != null) ? a.latestEpisode : (w.latestEpisode || 0);
  const latestSeason = (a && a.latestSeason != null) ? a.latestSeason : (w.latestSeason || 1);
  // 平台列表：watchlist 优先，animeDb 兜底
  const platforms = (w.platforms && w.platforms.length) ? w.platforms : (a && a.platforms ? a.platforms : []);
  const primaryPlatform = platforms.find(p => p.isPrimary) || platforms[0] || null;
  // 状态：dropped 保留用户标记，其余始终按最新数据重新计算
  const status = w.status === 'dropped' ? 'dropped' : getMylistStatus(w);
  // 剩余集数 = latestEpisode - watchedEpisode
  const remaining = status === 'finished' ? 0 : Math.max(0, latestEpisode - w.watchedEpisode);
  // 更新频率：优先用番剧库 anime 的 nextAirDate 实时推算（与添加页 browseCard 一致），追番自带值兜底
  const updateFrequency = (a ? computeUpdateFrequency(a) : '') || w.updateFrequency || '';
  const catLabels = { anime: '番剧', cdrama: '国产剧', kdrama: '韩剧', jdrama: '日剧' };
  const acat = (a && a.category) || 'anime';
  return {
    ...w,
    animeId: w.tmdbId,
    name: w.name,
    cover: a ? a.cover : '',
    category: acat,
    categoryLabel: a && a.categoryLabel ? a.categoryLabel : (catLabels[acat] || acat),
    status,
    currentEpisode: w.watchedEpisode,
    currentSeason: w.watchedSeason,
    latestEpisode,
    latestSeason,
    remaining,
    platforms,
    platform: primaryPlatform ? primaryPlatform.platform : '',
    platformName: primaryPlatform ? (primaryPlatform.name || primaryPlatform.platform) : '',
    updateFrequency,
    // 封面是否可用
    hasCover: !!(a && a.cover && (a.cover.startsWith('http') || a.cover.startsWith('/api/img') || a.cover.startsWith('data:'))),
  };
}

// ======================== RENDER UPDATES（追番列表中最新集数有更新的） ========================
function renderUpdates() {
  const list = document.getElementById('updatesList');

  if (watchlist.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p class="text">还没有追番呢~</p><p class="sub">先去添加剧集吧 💕</p></div>';
    return;
  }

  const enriched = watchlist.map(enrichWatchlistItem);
  if (_watchlistIdDirty) { _watchlistIdDirty = false; saveWatchlistLocal(); }

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);

  // 过滤：追番列表中非弃番的、最新集数在昨日或今日更新的（通过 nextAirDate 判断最新一集的播出日）
  const updated = enriched.filter(it => {
    if (it.status === 'dropped') return false;
    const a = resolveAnime(it.tmdbId);
    if (!a || !a.nextAirDate) return false;
    const next = new Date(a.nextAirDate + 'T00:00:00');
    return next.getTime() >= yesterday.getTime() && next.getTime() < tomorrow.getTime();
  });

  if (updated.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p class="text">昨日和今日没有更新的追番</p><p class="sub">等番剧更新后再来看看吧~</p></div>';
    return;
  }

  // 分组：今日更新 / 昨日更新
  const todayItems = [];
  const yesterdayItems = [];
  updated.forEach(it => {
    const a = resolveAnime(it.tmdbId);
    const nd = a && a.nextAirDate ? a.nextAirDate : '';
    if (nd && new Date(nd + 'T00:00:00').getTime() === today.getTime()) {
      todayItems.push(it);
    } else {
      yesterdayItems.push(it);
    }
  });
  // 各组内按剧名排序
  const byName = (a, b) => (a.name || '').localeCompare(b.name || '', 'zh');
  todayItems.sort(byName);
  yesterdayItems.sort(byName);

  // 格式化日期为 MM/DD
  const fmtDate = dateStr => {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return (d.getMonth() + 1) + '/' + d.getDate();
  };

  const buildUpdateCard = (it) => {
    const { tmdbId, name, cover, status, hasCover, latestEpisode, latestSeason } = it;
    const statusText = MYLIST_STATUS_TEXT[status] || '追番中';
    const seasonMulti = latestSeason > 1;
    const latestLabel = seasonMulti
      ? 'S' + latestSeason + '·E' + latestEpisode
      : (latestEpisode ? '第' + latestEpisode + '集' : '?');
    const a = resolveAnime(tmdbId);
    const updateDateStr = a && a.nextAirDate ? fmtDate(a.nextAirDate) : '';
    // 数据来源：animeDb 里记录的 latestEpisode 来源（tmdb / 6789kb）
    const src = a && a.source === '6789kb' ? '6789kb' : 'tmdb';
    const srcBadge = src === '6789kb'
      ? '<span class="src-badge kb" title="最新集数来自 6789kb 聚合站">🔗 6789kb</span>'
      : '<span class="src-badge tmdb" title="最新集数来自 TMDB">🎬 TMDB</span>';

    return '<div class="wl-item update-card' + (updateDateStr ? '' : ' no-date') + '" onclick="openDetail(\'' + tmdbId + '\')">' +
      '<div class="card-deco"></div>' +
      '<div class="cover-wrap">' +
      (hasCover
        ? '<img class="cover" src="' + esc(proxyCover(cover)) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="cover-placeholder" style="display:none">' + (name || '?').charAt(0) + '</div>'
        : '<div class="cover-placeholder">' + (name || '?').charAt(0) + '</div>') +
      '<div class="cover-glow"></div>' +
      '<div class="cover-status ' + status + '">' + statusText + '</div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="u-top">' +
          '<span class="name-text">' + esc(name || '') + '</span>' +
          (updateDateStr ? '<span class="update-time">更新于 ' + updateDateStr + '</span>' : '') +
        '</div>' +
        '<div class="u-bottom">' +
          '<span class="ep-current">更新至' + latestLabel + '</span>' +
          srcBadge +
        '</div>' +
      '</div>';
  };

  // 一页上下分组展示，不再切换 tab：今日在上、昨日在下
  let html = '';
  if (todayItems.length > 0) {
    html += '<div class="update-group-header">🆕 今日更新 (' + todayItems.length + ')</div>';
    html += todayItems.map(buildUpdateCard).join('');
  }
  if (yesterdayItems.length > 0) {
    html += '<div class="update-group-header">📅 昨日更新 (' + yesterdayItems.length + ')</div>';
    html += yesterdayItems.map(buildUpdateCard).join('');
  }
  list.innerHTML = html;
}

function renderMylist() {
  updateMylistBadges();
  const list = document.getElementById('mylistList');

  if (watchlist.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p class="text">还没有番剧呢~</p><p class="sub">点右上角 + 添加番剧吧 💕</p></div>';
    return;
  }

  // enrich + 状态筛选 + 搜索过滤
  const enriched = watchlist.map(enrichWatchlistItem);
  // 自愈：若本次纠正了错的 tmdbId，写回 localStorage（下次纯 id 匹配，不再靠名字兜底）
  if (_watchlistIdDirty) { _watchlistIdDirty = false; saveWatchlistLocal(); }
  // 全部 = 排除 dropped 即可（raising + caughtup + finished 全显示，与「已追完」标签形成包含关系）
  let filtered = enriched;
  if (currentMylistFilter === 'all') {
    filtered = filtered.filter(it => it.status !== 'dropped');
  } else if (currentMylistFilter === 'raising') {
    filtered = filtered.filter(it => it.status === 'raising');
  } else if (currentMylistFilter === 'caughtup') {
    filtered = filtered.filter(it => it.status === 'caughtup' || it.status === 'finished');
  }
  const q = (document.getElementById('mylistSearchInput')?.value || '').trim().toLowerCase();
  if (q) {
    filtered = filtered.filter(it => (it.name || '').toLowerCase().includes(q));
  }
  // 排序：追番中(raising) 在前，已追完(caughtup/finished) 在后
  const _statusOrder = { raising: 0, caughtup: 1, finished: 1, dropped: 2, unknown: 0 };
  filtered.sort((a, b) => (_statusOrder[a.status] ?? 0) - (_statusOrder[b.status] ?? 0));
  if (filtered.length === 0) {
    const emptyMsg = q ? `没有找到包含「${q}」的追番` : '该分类下没有追番';
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p class="text">' + emptyMsg + '</p></div>';
    return;
  }

  list.innerHTML = filtered.map(it => {
    const { tmdbId, name, cover, status, hasCover, currentEpisode, latestEpisode, currentSeason, latestSeason, remaining, platforms, platform, platformName, updateFrequency } = it;
    const statusText = MYLIST_STATUS_TEXT[status] || '追番中';
    // 多季 vs 单季
    const seasonMulti = latestSeason > 1 || currentSeason > 1;
    // "追至第Y集" / "更新至第Y集"
    const currentLabel = seasonMulti
      ? `S${currentSeason}·E${currentEpisode}`
      : (currentEpisode ? `第${currentEpisode}集` : '-');
    const latestLabel = seasonMulti
      ? `S${latestSeason}·E${latestEpisode}`
      : (latestEpisode ? `第${latestEpisode}集` : '?');
    // 平台 tag: 用 inline SVG 渲染 logo（替代原来的色块字符）
    const platBrand = platform ? PLATFORM_BRAND[platform] : null;
    const platLogo = platBrand ? platBrand.svg : PLATFORM_FALLBACK_SVG;
    const platShort = platBrand ? platBrand.short : (platform ? platform.charAt(0).toUpperCase() : '');
    const platColor = platBrand ? platBrand.color : '#8B7AA8';
    const platLabel = platBrand ? platBrand.name : (platformName || platform || '其他');
    // 主平台「去看」按钮（主操作，置顶 + 带存集角标）
    let goWatchBtn = '';
    if (platforms.length > 0) {
      const primaryPlat = platforms.find(p => p.isPrimary) || platforms[0];
      const pu = (primaryPlat.url || '').trim();
      const goUrl = pu || (PLATFORM_SEARCH_URL[primaryPlat.platform] ? PLATFORM_SEARCH_URL[primaryPlat.platform] + encodeURIComponent(name || '') : '');
      if (goUrl) {
        const goLabel = pu ? '去看' : '搜看';
        const showBadge = (remaining > 0 && status !== 'dropped');
        goWatchBtn = `<div class="btn-go-wrap">
          <button class="btn-go-watch" onclick="event.stopPropagation();window.open('${esc(goUrl)}','_blank','noopener')" title="前往${esc(platLabel)}观看">${goLabel}</button>
          ${showBadge ? `<span class="go-badge">${remaining}</span>` : ''}
        </div>`;
      }
    }
    // 右侧操作：raising 显示"追更"（次操作，无角标）；dropped 显示"已弃番"；caughtup/finished 显示"已追完"
    let actionHtml = '';
    if (status === 'raising') {
      actionHtml = `<button class="btn-catch" onclick="event.stopPropagation();openProgress('${tmdbId}')" title="更新进度"><span class="catch-label">追更</span></button>`;
    } else if (status === 'dropped') {
      actionHtml = `<button class="btn-status dropped" onclick="event.stopPropagation();openDetail('${tmdbId}')" title="操作">已弃番</button>`;
    } else if (status === 'caughtup' || status === 'finished') {
      actionHtml = `<button class="btn-status caughtup" onclick="event.stopPropagation();openProgress('${tmdbId}')" title="查看进度">已追完</button>`;
    }
    return `<div class="wl-item" onclick="openDetail('${tmdbId}')">
      <div class="card-deco"></div>
      <div class="cover-wrap">
        ${hasCover
          ? `<img class="cover" src="${esc(proxyCover(cover))}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="cover-placeholder" style="display:none">${(name||'?').charAt(0)}</div>`
          : `<div class="cover-placeholder">${(name||'?').charAt(0)}</div>`}
        <div class="cover-glow"></div>
        <div class="cover-status ${status}">${statusText}</div>
      </div>
      <div class="info">
        <div class="anime-name">
          <span class="name-text">${esc(name || '')}</span>
        </div>
        <div class="anime-meta">
          ${platform
            ? `<span class="platform-tag">
                <span class="platform-icon platform-icon-svg" aria-label="${esc(platLabel)}" title="${esc(platLabel)}">${platLogo}</span>
                <span class="platform-name">${esc(platLabel)}</span>
              </span>`
            : `<span class="platform-empty">暂无平台</span>`}
          ${updateFrequency ? `<span class="anime-schedule">${esc(updateFrequency)}</span>` : ''}
        </div>
        <div class="anime-episode-info">
          <span><span class="ep-current">追至${currentLabel || '-'}</span></span>
          <span>更新至${latestLabel}</span>
        </div>
      </div>
      <div class="anime-actions">${goWatchBtn}${actionHtml}</div>
    </div>`;
  }).join('');
}

// ======================== PERSIST (LOCAL) ========================
// 用户单条操作（加/删/改进度/弃番/编辑平台等）保存：本机持久化 + 立即上传 Gitee，
// 上传期间整页加载动画锁定，结果返回前不可继续操作。
function saveWatchlist() {
  saveWatchlistLocal();
  pushWatchlist(true);
}
// 按名字去重追番列表（番剧库偶有同名不同 tmdbId 的条目，避免"我的列表"出现重复番剧）
// 同名多条时保留：在库内(有正确 tmdbId) 且 latestEpisode 更高的一条
function dedupeWatchlistByName() {
  if (watchlist.length < 2) return false;
  const seen = new Set();
  const result = [];
  let changed = false;
  const score = (x) => ((animeDb.find(a => String(a.tmdbId) === String(x.tmdbId))) ? 100000 : 0) + (Number(x.latestEpisode) || 0);
  for (const w of watchlist) {
    const n = (w.name || '').trim();
    if (!n) { result.push(w); continue; }
    if (!seen.has(n)) { seen.add(n); result.push(w); }
    else {
      changed = true;
      const idx = result.findIndex(r => (r.name || '').trim() === n);
      if (idx >= 0 && score(w) > score(result[idx])) result[idx] = w;
    }
  }
  if (changed) watchlist = result;
  return changed;
}
function saveSettings() {
  localStorage.setItem('anime_coze_settings', JSON.stringify(settings));
}

// ======================== CLOUD WATCHLIST SYNC (Gitee via CF proxy) ========================
// 浏览器同源调用 /api/proxy，由 Cloudflare 边缘转发到 Gitee API（避开 CORS，前端不保存任何 Token）。
// Gitee token / 仓库写在 Cloudflare Pages 环境变量，不进前端源码。
const GITEE_WATCHLIST_PATH = 'data/watchlist.json';
const PROXY_BASE = '/api/proxy';

let _syncTimer = null;

// 从 Gitee 拉取最新追剧记录；代理不可用时回退到站点同源快照（每日工作流镜像的 data/watchlist.json）
async function pullWatchlist(showMsg = false) {
  try {
    const resp = await fetch(`${PROXY_BASE}?path=${encodeURIComponent(GITEE_WATCHLIST_PATH)}`, { cache: 'no-store' });
    if (resp.status === 404) { if (showMsg) showToast('☁️ 云端还没有追剧记录'); return; }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const data = text ? JSON.parse(text) : [];
    if (!Array.isArray(data)) return;
    mergeWatchlist(data);
    markSynced();
    if (showMsg) showToast(`🔄 已刷新，当前 ${watchlist.length} 条追剧记录`);
  } catch (e) {
    if (await tryFallbackSnapshot(showMsg)) return;
    if (showMsg) showToast('❌ 云端刷新失败，已保留本机数据');
  }
}

// 保存追剧记录到 Gitee（经代理）
let _uploadingToGitee = false;   // 上传 Gitee 进行中标志（防重入 + 整页锁定）
// 整页锁定遮罩开关（上传 Gitee 期间禁止继续操作）
function setUploadLock(on) {
  const overlay = document.getElementById('uploadBlockOverlay');
  if (overlay) overlay.classList.toggle('hidden', !on);
}

// 上传本机追番列表到 Gitee（经 /api/proxy）。
// block=true（默认）：整页加载动画 + 锁定，结果返回前不可操作；防重入。
async function pushWatchlist(block = true) {
  if (block) {
    if (_uploadingToGitee) return;   // 上一次上传未结束，忽略重复触发
    _uploadingToGitee = true;
    setUploadLock(true);
  }
  try {
    const content = JSON.stringify(watchlist, null, 2);
    const resp = await fetch(`${PROXY_BASE}?path=${encodeURIComponent(GITEE_WATCHLIST_PATH)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: content,
    });
    if (resp.ok) {
      markSynced();
      const rj = await resp.json().catch(() => ({}));
      const repo = rj.repo || 'Gitee';
      const branch = rj.branch || '';
      const sha = rj.sha || '';
      const records = (typeof rj.records === 'number') ? rj.records : watchlist.length;
      const kb = rj.bytes ? (rj.bytes / 1024).toFixed(1) + 'KB' : '';
      const sub = [
        `${repo}${branch ? ' · ' + branch : ''}`,
        `${records} 条追剧记录`,
        sha ? `提交 ${sha}` : '',
        kb,
      ].filter(Boolean).join('   ·   ');
      showSuccessToast('✅ 已成功保存到 Gitee', sub);
    } else {
      const err = await resp.json().catch(() => ({}));
      console.warn('push watchlist failed', err);
      const detail = (err && err.error) ? String(err.error).slice(0, 32) : `HTTP ${resp.status}`;
      showToast(`⚠️ 同步 Gitee 失败（${detail}），已保留本机`);
    }
  } catch (e) {
    console.warn('push watchlist error', e);
    showToast('⚠️ 同步 Gitee 失败（网络），已保留本机');
  } finally {
    if (block) { setUploadLock(false); _uploadingToGitee = false; }
  }
}

// 用云端/快照数据替换本机追番列表（按 tmdbId 去重）；仅本机持久化，不回推避免回环
function mergeWatchlist(data) {
  if (!Array.isArray(data)) return;
  // 安全网：云端返回空数组时不覆盖（避免云端空数据清空本机）。
  if (data.length === 0) return;
  const map = new Map();
  data.forEach(cw => { if (cw && cw.tmdbId != null) map.set(String(cw.tmdbId), cw); });
  watchlist = Array.from(map.values());
  dedupeWatchlistByName();
  saveWatchlistLocal();
  renderMylist();
}

// 代理不可用时，尝试用站点同源快照（每日工作流从 Gitee 镜像）
async function tryFallbackSnapshot(showMsg) {
  try {
    const fb = await fetch('./data/watchlist.json', { cache: 'no-store' });
    if (!fb.ok) return false;
    const data = await fb.json();
    if (!Array.isArray(data) || !data.length) return false;
    mergeWatchlist(data);
    if (showMsg) showToast(`🔄 已用站点快照刷新（${watchlist.length} 条）`);
    return true;
  } catch (_) { return false; }
}

// 记录一次成功同步的时间戳（供「同步中心」展示）
function markSynced() {
  settings.lastSyncAt = new Date().toISOString();
  saveSettings();
  updateSyncStatus();
}

// 本机保存后 3 秒自动同步到云端
function scheduleSync() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => pushWatchlist(true), 3000);
}

// 仅本机持久化（不触发网络）
function saveWatchlistLocal() {
  localStorage.setItem('anime_coze_watchlist', JSON.stringify(watchlist));
}

// 导出「追番记录」为 JSON 文本（适配手机端：不依赖文件，直接复制）
function exportConfig() {
  const text = JSON.stringify(watchlist, null, 2);
  const ta = document.getElementById('cfgTextArea');
  if (ta) ta.value = text;
  const cp = document.getElementById('copyCfgBtn');
  if (cp) cp.style.display = '';
  showToast(`📤 已生成备份（${watchlist.length} 部），可点「复制」保存`);
}

// 复制配置文本到剪贴板
function copyConfigText() {
  const ta = document.getElementById('cfgTextArea');
  if (!ta || !ta.value) return;
  const done = () => showToast('📋 已复制配置文本');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(done).catch(() => fallbackCopy(ta, done));
  } else {
    fallbackCopy(ta, done);
  }
}
function fallbackCopy(ta, done) {
  ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
  try { document.execCommand('copy'); done(); } catch (e) { showToast('❌ 复制失败，请手动选择'); }
  if (window.getSelection) window.getSelection().removeAllRanges();
}

// 从 JSON 文本导入「追番记录」并按剧集智能合并，随后上传云端，适配手机端
function importConfigFromText() {
  const ta = document.getElementById('cfgTextArea');
  const raw = (ta && ta.value || '').trim();
  if (!raw) { showToast('❌ 请先粘贴追番备份 JSON'); return; }
  let data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    showToast('❌ 备份 JSON 无效'); return;
  }
  if (!Array.isArray(data)) { showToast('❌ 这不是追番备份（应为 JSON 数组）'); return; }
  const before = watchlist.length;
  mergeWatchlist(data);          // 按 tmdbId/名字合并，不覆盖已有记录
  updateSyncStatus();
  showToast(`✅ 已导入并合并（${before} → ${watchlist.length} 部）`);
  scheduleSync();               // 合并结果自动同步回云端
}

// ======================== REFRESH ========================
function refreshWatchlist() {
  // 整页刷新：等价于浏览器 F5 / 重新加载，保证追番列表与番剧库都从最新部署重新加载
  location.reload();
}

// ======================== UPLOAD (兜底) ========================
// 手动把本机最新追剧列表上传到 Gitee（经 /api/proxy）。
// 用于自动 3 秒同步未触发、或想立刻强制覆盖云端时的兜底。
async function uploadWatchlist() {
  if (_uploadingToGitee) return;            // 已有上传在进行，避免重复点击
  const btn = document.getElementById('uploadBtn');
  const prevText = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 上传中'; }
  try {
    await pushWatchlist(true);              // 内部处理整页锁定/解锁 + 成功失败 toast
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = prevText; }
  }
}

// ======================== MODAL HELPERS ========================
// 滚动锁改为"派生状态"：只要有任意弹窗可见就锁，关闭任一个都基于实际状态还原，
// 避免嵌套弹窗（如详情→进度）关闭时误把滚动锁永久留下导致页面无法滑动。
let _scrollLockY = 0;
function syncBodyScroll() {
  // 只要页面上存在任意「可见」的弹窗层就锁住背景滚动；
  // 不再逐个列举弹窗 id，避免新增弹窗（platformPopup / editPlatformsModal 等）漏锁导致背景仍可滑动。
  const anyOpen = !!document.querySelector('.modal-overlay:not(.hidden)');
  if (anyOpen) {
    if (!document.body.classList.contains('modal-locked')) {
      _scrollLockY = window.scrollY || window.pageYOffset || 0;
      document.body.style.top = `-${_scrollLockY}px`;
      document.body.classList.add('modal-locked');
    }
  } else if (document.body.classList.contains('modal-locked')) {
    document.body.classList.remove('modal-locked');
    document.body.style.top = '';
    window.scrollTo(0, _scrollLockY);
  }
}
// 自动同步：任意弹窗 append / remove 或切换 .hidden 类时重新计算滚动锁，
// 彻底规避「漏调 syncBodyScroll」导致的背景可滑（搜索弹窗曾因直接切 .hidden 类而漏锁）。
const _scrollLockObserver = new MutationObserver(syncBodyScroll);
_scrollLockObserver.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });
function closeProgressModal() {
  const el = document.getElementById('progressModal');
  if (el) el.remove();
  syncBodyScroll();
}
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  syncBodyScroll();
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  syncBodyScroll();
}

// ======================== UTILITY ========================
function esc(s) {
  if (!s && s !== 0) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// ======================== START ========================
init();
</script>
